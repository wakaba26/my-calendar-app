<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ログイン</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="login-box">
    <h2>パスコード入力</h2>
    <input id="passInput" type="password" maxlength="4" placeholder="4桁の数字">
    <button id="loginBtn">ログイン</button>
    <button onclick="localStorage.removeItem('passcode'); location.reload();" style="margin-top: 20px; background:#ccc; color:#000;">
  パスコードをリセット
</button>

  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
